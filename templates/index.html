<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Shelf · 软件下载中心</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --surface2: #f0efeb;
    --border: #e4e3de;
    --border2: #d0cfc9;
    --text: #1a1a18;
    --text2: #6b6a65;
    --text3: #9e9d98;
    --accent: #5046e5;
    --accent-bg: #eeedfd;
    --accent-text: #3730c4;
    --dev: #eeedfd;    --dev-t: #3730c4;
    --office: #e1f5ee;  --office-t: #0a6649;
    --sys: #faeeda;    --sys-t: #7a4a08;
    --net: #e6f1fb;    --net-t: #1054a0;
    --other: #f1efeb;  --other-t: #4a4a46;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1c1c1a;
      --surface2: #242422;
      --border: #2e2e2b;
      --border2: #3a3a36;
      --text: #e8e8e4;
      --text2: #9a9993;
      --text3: #636360;
      --accent: #7b72ff;
      --accent-bg: #1e1c3a;
      --accent-text: #a09bff;
      --dev: #1e1c3a;   --dev-t: #a09bff;
      --office: #0d2a1f; --office-t: #4dc494;
      --sys: #261d08;   --sys-t: #d4a843;
      --net: #0e1f35;   --net-t: #5fa8ee;
      --other: #1e1e1c; --other-t: #9a9993;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── 顶栏 ── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(245,245,243,.9);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  @media (prefers-color-scheme: dark) {
    .topbar { background: rgba(17,17,16,.9); }
  }
  .logo {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -.3px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
    text-decoration: none;
  }
  .logo-icon {
    width: 24px;
    height: 24px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-icon svg { display: block; }
  .search-wrap {
    flex: 1;
    max-width: 400px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    pointer-events: none;
  }
  #search {
    width: 100%;
    height: 34px;
    padding: 0 12px 0 34px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color .15s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text3); }
  .topbar-count {
    font-size: 12px;
    color: var(--text3);
    white-space: nowrap;
    margin-left: auto;
  }

  /* ── 布局 ── */
  .layout {
    display: flex;
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 24px 48px;
    gap: 24px;
    align-items: flex-start;
  }

  /* ── 侧栏 ── */
  .sidebar {
    width: 180px;
    flex-shrink: 0;
    position: sticky;
    top: 80px;
  }
  .sidebar-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 0 10px 8px;
  }
  .cat-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 7px 10px;
    border: none;
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    transition: background .12s, color .12s;
  }
  .cat-btn:hover { background: var(--surface2); color: var(--text); }
  .cat-btn.active { background: var(--accent-bg); color: var(--accent-text); font-weight: 500; }
  .cat-btn .cat-icon {
    width: 22px;
    height: 22px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
  }
  .cat-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text3);
    background: var(--surface2);
    border-radius: 99px;
    padding: 1px 6px;
  }
  .cat-btn.active .cat-count { background: var(--accent-bg); color: var(--accent-text); }

  /* ── 主区域 ── */
  .main { flex: 1; min-width: 0; }

  .section-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: .02em;
  }

  /* ── 卡片网格 ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: border-color .15s, transform .12s, box-shadow .15s;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
    outline: none;
  }
  .card:hover { border-color: var(--border2); box-shadow: 0 4px 12px rgba(0,0,0,.08); transform: translateY(-1px); }
  .card:focus-visible { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(80,70,229,.15); }
  .card.selected { border-color: var(--accent); }

  .card-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .card-icon img { width: 100%; height: 100%; object-fit: contain; }
  .card-icon .fallback {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 600;
    color: var(--accent-text);
    background: var(--accent-bg);
  }
  .card-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-desc { font-size: 12px; color: var(--text2); line-height: 1.5; flex: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 12px; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
  .version-badge {
    font-size: 11px;
    color: var(--text3);
    background: var(--surface2);
    border-radius: 99px;
    padding: 2px 8px;
    border: 1px solid var(--border);
  }
  .dl-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    background: var(--accent-bg);
    cursor: pointer;
    transition: background .12s;
    text-decoration: none;
  }
  .dl-btn:hover { background: #dddcfc; }
  @media (prefers-color-scheme: dark) { .dl-btn:hover { background: #2a2860; } }

  /* ── 详情抽屉 ── */
  .drawer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.35);
    z-index: 200;
    animation: fade-in .15s ease;
  }
  .drawer-overlay.open { display: block; }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

  .drawer {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: 380px;
    max-width: 90vw;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 201;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform .22s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
  }
  .drawer.open { transform: translateX(0); }

  .drawer-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .drawer-icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    overflow: hidden;
    flex-shrink: 0;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .drawer-icon img { width: 100%; height: 100%; object-fit: contain; }
  .drawer-icon .fallback {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent-text);
  }
  .drawer-title-wrap { flex: 1; min-width: 0; }
  .drawer-name { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .drawer-publisher { font-size: 12px; color: var(--text3); margin-bottom: 6px; }
  .cat-pill {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 99px;
    font-weight: 500;
  }
  .drawer-close {
    width: 28px;
    height: 28px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    background: transparent;
    cursor: pointer;
    color: var(--text2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .12s;
  }
  .drawer-close:hover { background: var(--surface2); }

  .drawer-body { padding: 20px; flex: 1; overflow-y: auto; }
  .drawer-desc { font-size: 14px; color: var(--text2); line-height: 1.7; margin-bottom: 20px; }
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
  .meta-card {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
  }
  .meta-label { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
  .meta-val { font-size: 14px; font-weight: 600; color: var(--text); }

  /* 下载区 */
  .download-section { border-top: 1px solid var(--border); padding-top: 20px; }
  .download-title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }
  .download-main-btn {
    width: 100%;
    height: 42px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity .15s, transform .12s;
    text-decoration: none;
  }
  .download-main-btn:hover { opacity: .88; }
  .download-main-btn:active { transform: scale(.98); }
  .download-main-btn:disabled { opacity: .5; cursor: not-allowed; }

  /* 进度条 */
  .progress-wrap { margin-top: 14px; display: none; }
  .progress-wrap.visible { display: block; }
  .progress-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .progress-bar {
    height: 5px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width .3s ease;
    width: 0%;
  }
  .progress-status { font-size: 11px; color: var(--text3); margin-top: 5px; }

  /* 空状态 */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--text3);
  }
  .empty svg { margin-bottom: 12px; opacity: .4; }
  .empty p { font-size: 14px; }

  /* 加载态 */
  .skeleton-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 12px; }
  .skeleton-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    height: 158px;
    overflow: hidden;
    position: relative;
  }
  .skeleton-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, var(--surface2) 50%, transparent 100%);
    animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

  @media (max-width: 640px) {
    .sidebar { display: none; }
    .layout { padding: 16px; }
    .grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header class="topbar">
  <a class="logo" href="/">
    <div class="logo-icon">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    AppShelf
  </a>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <circle cx="6" cy="6" r="4.5"/><path d="M10.5 10.5l2 2"/>
    </svg>
    <input type="search" id="search" placeholder="搜索软件…" autocomplete="off" />
  </div>
  <span class="topbar-count" id="count"></span>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar" aria-label="软件分类"></nav>
  <main class="main" id="main">
    <div class="skeleton-grid" id="skeleton">
      ${Array(6).fill('<div class="skeleton-card"></div>').join('')}
    </div>
  </main>
</div>

<!-- 详情抽屉 -->
<div class="drawer-overlay" id="overlay" role="presentation"></div>
<aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-label="软件详情">
  <div class="drawer-header">
    <div class="drawer-icon" id="d-icon"></div>
    <div class="drawer-title-wrap">
      <div class="drawer-name" id="d-name"></div>
      <div class="drawer-publisher" id="d-publisher"></div>
      <span class="cat-pill" id="d-cat"></span>
    </div>
    <button class="drawer-close" id="drawer-close" aria-label="关闭详情">
      <svg width="12" height="12" viewBox="0 0 12 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/>
      </svg>
    </button>
  </div>
  <div class="drawer-body">
    <div class="drawer-desc" id="d-desc"></div>
    <div class="meta-grid" id="d-meta"></div>
    <div class="download-section">
      <div class="download-title">下载</div>
      <button class="download-main-btn" id="d-dl-btn">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7.5 1v9M4.5 7l3 3 3-3M2 12h11"/>
        </svg>
        下载
      </button>
      <div class="progress-wrap" id="d-progress">
        <div class="progress-info">
          <span id="d-prog-label">准备下载…</span>
          <span id="d-prog-pct">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="d-prog-fill"></div></div>
        <div class="progress-status" id="d-prog-status"></div>
      </div>
    </div>
  </div>
</aside>

<script>
(function () {
  /* ── 分类颜色映射 ── */
  const CAT_STYLE = {
    '开发工具': { bg: 'var(--dev)',    color: 'var(--dev-t)',    icon: '⌨️' },
    '办公软件': { bg: 'var(--office)', color: 'var(--office-t)', icon: '📄' },
    '系统工具': { bg: 'var(--sys)',    color: 'var(--sys-t)',    icon: '⚙️' },
    '网络工具': { bg: 'var(--net)',    color: 'var(--net-t)',    icon: '🌐' },
  };
  function catStyle(cat) {
    return CAT_STYLE[cat] || { bg: 'var(--other)', color: 'var(--other-t)', icon: '📦' };
  }

  /* ── 状态 ── */
  let ALL_APPS = [];
  let activeCategory = 'all';
  let keyword = '';
  let currentApp = null;
  let downloading = false;

  /* ── DOM ── */
  const $sidebar  = document.getElementById('sidebar');
  const $main     = document.getElementById('main');
  const $skeleton = document.getElementById('skeleton');
  const $search   = document.getElementById('search');
  const $count    = document.getElementById('count');
  const $overlay  = document.getElementById('overlay');
  const $drawer   = document.getElementById('drawer');
  const $dName    = document.getElementById('d-name');
  const $dPublisher = document.getElementById('d-publisher');
  const $dCat     = document.getElementById('d-cat');
  const $dIcon    = document.getElementById('d-icon');
  const $dDesc    = document.getElementById('d-desc');
  const $dMeta    = document.getElementById('d-meta');
  const $dDlBtn   = document.getElementById('d-dl-btn');
  const $dProgress= document.getElementById('d-progress');
  const $dProgLabel = document.getElementById('d-prog-label');
  const $dProgPct = document.getElementById('d-prog-pct');
  const $dProgFill= document.getElementById('d-prog-fill');
  const $dProgStatus = document.getElementById('d-prog-status');
  const $drawerClose = document.getElementById('drawer-close');

  /* ── 过滤 ── */
  function filtered() {
    return ALL_APPS.filter(a => {
      const matchCat = activeCategory === 'all' || a.category === activeCategory;
      const matchKw  = !keyword || a.name.toLowerCase().includes(keyword) || (a.description || '').toLowerCase().includes(keyword);
      return matchCat && matchKw;
    });
  }

  /* ── 图标渲染 ── */
  function iconEl(app, size) {
    const wrap = document.createElement('div');
    wrap.className = size === 'lg' ? 'drawer-icon' : 'card-icon';
    const img = document.createElement('img');
    img.src = app.icon || '';
    img.alt = app.name;
    img.onerror = function () {
      wrap.innerHTML = '';
      const fb = document.createElement('div');
      fb.className = 'fallback';
      fb.textContent = (app.name || '?')[0].toUpperCase();
      if (size !== 'lg') {
        const s = catStyle(app.category);
        fb.style.background = s.bg;
        fb.style.color = s.color;
      }
      wrap.appendChild(fb);
    };
    wrap.appendChild(img);
    return wrap;
  }

  /* ── 渲染侧栏 ── */
  function renderSidebar() {
    const counts = {};
    ALL_APPS.forEach(a => { counts[a.category] = (counts[a.category] || 0) + 1; });
    const cats = Object.keys(counts);

    let html = '<div class="sidebar-label">分类</div>';
    const allActive = activeCategory === 'all' ? ' active' : '';
    html += `<button class="cat-btn${allActive}" data-cat="all">
      <span class="cat-icon" style="background:var(--surface2)">📦</span>
      全部
      <span class="cat-count">${ALL_APPS.length}</span>
    </button>`;
    cats.forEach(cat => {
      const s = catStyle(cat);
      const active = activeCategory === cat ? ' active' : '';
      html += `<button class="cat-btn${active}" data-cat="${cat}">
        <span class="cat-icon" style="background:${s.bg}">${s.icon}</span>
        ${cat}
        <span class="cat-count">${counts[cat]}</span>
      </button>`;
    });
    $sidebar.innerHTML = html;
    $sidebar.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeCategory = btn.dataset.cat;
        renderSidebar();
        renderGrid();
      });
    });
  }

  /* ── 渲染卡片网格 ── */
  function renderGrid() {
    const list = filtered();
    $count.textContent = `${list.length} 款软件`;

    if (list.length === 0) {
      $main.innerHTML = `<div class="empty">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="18" cy="18" r="12"/><line x1="27" y1="27" x2="37" y2="37"/>
        </svg>
        <p>没有找到匹配的软件</p>
      </div>`;
      return;
    }

    const grid = document.createElement('div');
    grid.className = 'grid';

    list.forEach(app => {
      const card = document.createElement('div');
      card.className = 'card';
      card.tabIndex = 0;
      card.setAttribute('role', 'button');
      card.setAttribute('aria-label', app.name);

      const icon = iconEl(app, 'sm');

      const body = document.createElement('div');
      const s = catStyle(app.category);
      body.innerHTML = `
        <div class="card-name">${esc(app.name)}</div>
        <div class="card-desc">${esc(app.description || '')}</div>
        <div class="card-footer">
          <span class="version-badge">v${esc(app.version || '-')}</span>
          <a class="dl-btn" href="${esc(app.download_url)}" download
             onclick="event.stopPropagation()" title="直接下载">
            <svg width="12" height="12" viewBox="0 0 12 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
              <path d="M6 1v7M3.5 5.5L6 8l2.5-2.5M1.5 10h9"/>
            </svg>
            下载
          </a>
        </div>
      `;

      card.appendChild(icon);
      card.appendChild(body);

      card.addEventListener('click', () => openDrawer(app));
      card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openDrawer(app); });
      grid.appendChild(card);
    });

    $main.innerHTML = '';
    $main.appendChild(grid);
  }

  /* ── 抽屉 ── */
  function openDrawer(app) {
    currentApp = app;
    const s = catStyle(app.category);

    // 图标
    $dIcon.innerHTML = '';
    const icon = iconEl(app, 'lg');
    $dIcon.appendChild(icon);

    $dName.textContent = app.name;
    $dPublisher.textContent = app.publisher || '';
    $dCat.textContent = app.category;
    $dCat.style.background = s.bg;
    $dCat.style.color = s.color;
    $dDesc.textContent = app.description || '';

    $dMeta.innerHTML = `
      <div class="meta-card"><div class="meta-label">版本</div><div class="meta-val">${esc(app.version || '-')}</div></div>
      <div class="meta-card"><div class="meta-label">大小</div><div class="meta-val">${esc(app.size || '-')}</div></div>
      <div class="meta-card"><div class="meta-label">分类</div><div class="meta-val">${esc(app.category)}</div></div>
      <div class="meta-card"><div class="meta-label">发行商</div><div class="meta-val">${esc(app.publisher || '-')}</div></div>
    `;

    resetProgress();
    $dDlBtn.innerHTML = `<svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7.5 1v9M4.5 7l3 3 3-3M2 12h11"/></svg> 下载`;
    $dDlBtn.disabled = false;

    $overlay.classList.add('open');
    $drawer.classList.add('open');
    $drawerClose.focus();
    document.body.style.overflow = 'hidden';
  }

  function closeDrawer() {
    $overlay.classList.remove('open');
    $drawer.classList.remove('open');
    document.body.style.overflow = '';
    currentApp = null;
  }

  function resetProgress() {
    $dProgress.classList.remove('visible');
    $dProgFill.style.width = '0%';
    $dProgLabel.textContent = '准备下载…';
    $dProgPct.textContent = '0%';
    $dProgStatus.textContent = '';
    downloading = false;
  }

  /* ── 带进度条的下载 ── */
  $dDlBtn.addEventListener('click', async () => {
    if (!currentApp || downloading) return;
    const url = currentApp.download_url;
    if (!url) return;

    downloading = true;
    $dDlBtn.disabled = true;
    $dProgress.classList.add('visible');
    $dProgLabel.textContent = '连接中…';

    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const total = parseInt(res.headers.get('Content-Length') || '0');
      const reader = res.body.getReader();
      const chunks = [];
      let loaded = 0;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        loaded += value.length;
        const pct = total ? Math.round(loaded / total * 100) : 0;
        $dProgFill.style.width = pct + '%';
        $dProgPct.textContent = pct + '%';
        $dProgLabel.textContent = `正在下载… ${formatBytes(loaded)}${total ? ' / ' + formatBytes(total) : ''}`;
      }

      // 触发浏览器保存
      const blob = new Blob(chunks);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = url.split('/').pop();
      a.click();
      URL.revokeObjectURL(a.href);

      $dProgFill.style.width = '100%';
      $dProgPct.textContent = '100%';
      $dProgLabel.textContent = '下载完成';
      $dProgStatus.textContent = `已保存：${a.download}`;
      $dDlBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7l4 4 6-6"/></svg> 完成`;
    } catch (err) {
      $dProgLabel.textContent = '下载失败';
      $dProgStatus.textContent = err.message;
      $dProgFill.style.background = '#e24b4a';
      $dDlBtn.disabled = false;
      downloading = false;
    }
  });

  function formatBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1024 / 1024).toFixed(1) + ' MB';
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  /* ── 关闭事件 ── */
  $overlay.addEventListener('click', closeDrawer);
  $drawerClose.addEventListener('click', closeDrawer);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

  /* ── 搜索 ── */
  $search.addEventListener('input', () => {
    keyword = $search.value.trim().toLowerCase();
    renderGrid();
  });

  /* ── 初始化 ── */
  async function init() {
    try {
      const res = await fetch('/api/apps');
      ALL_APPS = await res.json();
    } catch (e) {
      ALL_APPS = [];
    }
    $skeleton.remove();
    renderSidebar();
    renderGrid();
  }

  init();
})();
</script>
</body>
</html>
