<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AppVault · 软件下载中心</title>
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f3; --surface: #ffffff; --surface2: #f0efeb;
    --border: #e4e3de; --border2: #d0cfc9;
    --text: #1a1a18; --text2: #6b6a65; --text3: #9e9d98;
    --accent: #5046e5; --accent-bg: #eeedfd; --accent-text: #3730c4;
    --win-bg: #e6f1fb; --win-t: #1054a0;
    --mac-bg: #f0efeb; --mac-t: #3a3a36;
    --linux-bg: #faeeda; --linux-t: #7a4a08;
    --cross-bg: #e1f5ee; --cross-t: #0a6649;
    --arm-bg: #f3e8ff; --arm-t: #6b21a8;
    --radius: 10px; --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110; --surface: #1c1c1a; --surface2: #242422;
      --border: #2e2e2b; --border2: #3a3a36;
      --text: #e8e8e4; --text2: #9a9993; --text3: #636360;
      --accent: #7b72ff; --accent-bg: #1e1c3a; --accent-text: #a09bff;
      --win-bg: #0e1f35; --win-t: #5fa8ee;
      --mac-bg: #1e1e1c; --mac-t: #9a9993;
      --linux-bg: #261d08; --linux-t: #d4a843;
      --cross-bg: #0d2a1f; --cross-t: #4dc494;
      --arm-bg: #2d1a4a; --arm-t: #c084fc;
    }
  }

  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; min-height: 100vh; }

  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(245,245,243,.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px;
    display: flex; align-items: center; gap: 16px;
  }
  @media (prefers-color-scheme: dark) { .topbar { background: rgba(17,17,16,.9); } }
  .logo { font-size: 16px; font-weight: 700; letter-spacing: -.4px; color: var(--text); display: flex; align-items: center; gap: 7px; white-space: nowrap; text-decoration: none; }
  .logo-icon { width: 26px; height: 26px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
  .logo-icon svg { display: block; }
  .search-wrap { flex: 1; max-width: 400px; position: relative; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
  #search { width: 100%; height: 34px; padding: 0 12px 0 34px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 13px; outline: none; transition: border-color .15s; }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text3); }
  .topbar-count { font-size: 12px; color: var(--text3); white-space: nowrap; margin-left: auto; }

  .layout { display: flex; max-width: 1140px; margin: 0 auto; padding: 24px 24px 48px; gap: 24px; align-items: flex-start; }

  /* sidebar */
  .sidebar { width: 188px; flex-shrink: 0; position: sticky; top: 80px; }
  .sidebar-section { margin-bottom: 20px; }
  .sidebar-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .06em; text-transform: uppercase; padding: 0 10px 8px; }
  .filter-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 7px 10px; border: none; border-radius: var(--radius-sm); background: transparent; color: var(--text2); font-size: 13px; cursor: pointer; text-align: left; transition: background .12s, color .12s; }
  .filter-btn:hover { background: var(--surface2); color: var(--text); }
  .filter-btn.active { background: var(--accent-bg); color: var(--accent-text); font-weight: 500; }
  .filter-count { margin-left: auto; font-size: 11px; color: var(--text3); background: var(--surface2); border-radius: 99px; padding: 1px 6px; }
  .filter-btn.active .filter-count { background: var(--accent-bg); color: var(--accent-text); }
  .tag-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* main */
  .main { flex: 1; min-width: 0; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: border-color .15s, transform .12s, box-shadow .15s; box-shadow: var(--shadow); display: flex; flex-direction: column; outline: none; }
  .card:hover { border-color: var(--border2); box-shadow: 0 4px 12px rgba(0,0,0,.08); transform: translateY(-1px); }
  .card:focus-visible { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(80,70,229,.15); }

  .card-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; overflow: hidden; flex-shrink: 0; }
  .card-icon img { width: 100%; height: 100%; object-fit: contain; }
  .card-icon .fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; border-radius: 10px; }
  .card-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-desc { font-size: 12px; color: var(--text2); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 8px; }
  .tags-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; min-height: 20px; }
  .tag { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 99px; cursor: pointer; transition: opacity .12s; }
  .tag:hover { opacity: .75; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
  .version-badge { font-size: 11px; color: var(--text3); background: var(--surface2); border-radius: 99px; padding: 2px 8px; border: 1px solid var(--border); }
  .dl-btn { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--accent); font-weight: 500; padding: 4px 10px; border-radius: var(--radius-sm); border: 1px solid transparent; background: var(--accent-bg); cursor: pointer; transition: background .12s; text-decoration: none; }
  .dl-btn:hover { background: #dddcfc; }
  @media (prefers-color-scheme: dark) { .dl-btn:hover { background: #2a2860; } }

  /* drawer */
  .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 200; }
  .drawer-overlay.open { display: block; }
  .drawer { position: fixed; right: 0; top: 0; bottom: 0; width: 400px; max-width: 90vw; background: var(--surface); border-left: 1px solid var(--border); z-index: 201; display: flex; flex-direction: column; transform: translateX(100%); transition: transform .22s cubic-bezier(.4,0,.2,1); }
  .drawer.open { transform: translateX(0); }
  .drawer-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 14px; }
  .drawer-icon { width: 56px; height: 56px; border-radius: 14px; overflow: hidden; flex-shrink: 0; background: var(--surface2); display: flex; align-items: center; justify-content: center; }
  .drawer-icon img { width: 100%; height: 100%; object-fit: contain; }
  .drawer-icon .fallback { font-size: 26px; font-weight: 700; }
  .drawer-title-wrap { flex: 1; min-width: 0; }
  .drawer-name { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .drawer-publisher { font-size: 12px; color: var(--text3); margin-bottom: 8px; }
  .drawer-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .icon-btn { width: 30px; height: 30px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: transparent; cursor: pointer; color: var(--text2); display: flex; align-items: center; justify-content: center; transition: background .12s; }
  .icon-btn:hover { background: var(--surface2); }
  .drawer-body { padding: 20px; flex: 1; overflow-y: auto; }
  .drawer-desc { font-size: 14px; color: var(--text2); line-height: 1.7; margin-bottom: 20px; }
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
  .meta-card { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; }
  .meta-label { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
  .meta-val { font-size: 14px; font-weight: 600; color: var(--text); }
  .download-section { border-top: 1px solid var(--border); padding-top: 20px; }
  .download-title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }
  .download-main-btn { width: 100%; height: 42px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity .15s, transform .12s; }
  .download-main-btn:hover { opacity: .88; }
  .download-main-btn:active { transform: scale(.98); }
  .download-main-btn:disabled { opacity: .5; cursor: not-allowed; }
  .progress-wrap { margin-top: 14px; display: none; }
  .progress-wrap.visible { display: block; }
  .progress-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .progress-bar { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .3s ease; width: 0%; }
  .progress-status { font-size: 11px; color: var(--text3); margin-top: 5px; }

  /* empty / skeleton */
  .empty { text-align: center; padding: 80px 20px; color: var(--text3); }
  .empty svg { margin-bottom: 12px; opacity: .4; }
  .empty p { font-size: 14px; }
  .skeleton-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 12px; }
  .skeleton-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; height: 170px; overflow: hidden; position: relative; }
  .skeleton-card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent 0%, var(--surface2) 50%, transparent 100%); animation: shimmer 1.4s infinite; }
  @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

  @media (max-width: 640px) { .sidebar { display: none; } .layout { padding: 16px; } .grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<header class="topbar">
  <a class="logo" href="/">
    <div class="logo-icon">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <rect x="2" y="3" width="10" height="8" rx="1.5" stroke="#fff" stroke-width="1.6"/>
        <path d="M5 3V2.5a2 2 0 0 1 4 0V3" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </div>
    AppVault
  </a>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <circle cx="6" cy="6" r="4.5"/><path d="M10.5 10.5l2 2"/>
    </svg>
    <input type="search" id="search" placeholder="搜索软件…" autocomplete="off" />
  </div>
  <span class="topbar-count" id="count"></span>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar" aria-label="筛选"></nav>
  <main class="main" id="main">
    <div class="skeleton-grid" id="skeleton">
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
    </div>
  </main>
</div>

<div class="drawer-overlay" id="overlay"></div>
<aside class="drawer" id="drawer" role="dialog" aria-modal="true">
  <div class="drawer-header">
    <div class="drawer-icon" id="d-icon"></div>
    <div class="drawer-title-wrap">
      <div class="drawer-name" id="d-name"></div>
      <div class="drawer-publisher" id="d-publisher"></div>
      <div class="drawer-tags" id="d-tags"></div>
    </div>
    <button class="icon-btn" id="drawer-close" aria-label="关闭">
      <svg width="12" height="12" viewBox="0 0 12 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/>
      </svg>
    </button>
  </div>
  <div class="drawer-body">
    <div class="drawer-desc" id="d-desc"></div>
    <div class="meta-grid" id="d-meta"></div>
    <div class="download-section">
      <div class="download-title">下载</div>
      <button class="download-main-btn" id="d-dl-btn">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7.5 1v9M4.5 7l3 3 3-3M2 12h11"/>
        </svg>
        下载
      </button>
      <div class="progress-wrap" id="d-progress">
        <div class="progress-info"><span id="d-prog-label">准备下载…</span><span id="d-prog-pct">0%</span></div>
        <div class="progress-bar"><div class="progress-fill" id="d-prog-fill"></div></div>
        <div class="progress-status" id="d-prog-status"></div>
      </div>
    </div>
  </div>
</aside>

<script>
(function () {
  const TAG_PALETTE = [
    {bg:'#eeedfd',color:'#3730c4'},{bg:'#e1f5ee',color:'#0a6649'},
    {bg:'#faeeda',color:'#7a4a08'},{bg:'#e6f1fb',color:'#1054a0'},
    {bg:'#f3e8ff',color:'#6b21a8'},{bg:'#fde8e8',color:'#9f1239'},
    {bg:'#ecfdf5',color:'#065f46'},{bg:'#fffbeb',color:'#92400e'},
  ];
  const TAG_PALETTE_DARK = [
    {bg:'#1e1c3a',color:'#a09bff'},{bg:'#0d2a1f',color:'#4dc494'},
    {bg:'#261d08',color:'#d4a843'},{bg:'#0e1f35',color:'#5fa8ee'},
    {bg:'#2d1a4a',color:'#c084fc'},{bg:'#3b0a0a',color:'#fca5a5'},
    {bg:'#064e3b',color:'#6ee7b7'},{bg:'#451a03',color:'#fcd34d'},
  ];
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const palette = isDark ? TAG_PALETTE_DARK : TAG_PALETTE;
  const tagColorMap = {};
  function tagStyle(tag) {
    if (!tagColorMap[tag]) { const i = Object.keys(tagColorMap).length % palette.length; tagColorMap[tag] = palette[i]; }
    return tagColorMap[tag];
  }
  const OS_STYLE = { 'Windows':{bg:'var(--win-bg)',color:'var(--win-t)'}, 'macOS':{bg:'var(--mac-bg)',color:'var(--mac-t)'}, 'Linux':{bg:'var(--linux-bg)',color:'var(--linux-t)'}, '跨平台':{bg:'var(--cross-bg)',color:'var(--cross-t)'} };
  const ARCH_STYLE = { 'x64':{bg:'var(--accent-bg)',color:'var(--accent-text)'}, 'x86':{bg:'var(--win-bg)',color:'var(--win-t)'}, 'ARM64':{bg:'var(--arm-bg)',color:'var(--arm-t)'}, 'Universal':{bg:'var(--cross-bg)',color:'var(--cross-t)'} };
  function osStyle(os)   { return OS_STYLE[os]  || {bg:'var(--surface2)',color:'var(--text2)'}; }
  function archStyle(ar) { return ARCH_STYLE[ar] || {bg:'var(--surface2)',color:'var(--text2)'}; }

  let ALL_APPS=[], activeTag='all', activeOS='all', activeArch='all', keyword='', currentApp=null, downloading=false;

  const $sidebar=$('#sidebar'), $main=$('#main'), $skeleton=$('#skeleton'), $search=$('#search'),
        $count=$('#count'), $overlay=$('#overlay'), $drawer=$('#drawer'),
        $dName=$('#d-name'), $dPublisher=$('#d-publisher'), $dTags=$('#d-tags'),
        $dIcon=$('#d-icon'), $dDesc=$('#d-desc'), $dMeta=$('#d-meta'),
        $dDlBtn=$('#d-dl-btn'), $dProgress=$('#d-progress'),
        $dProgLabel=$('#d-prog-label'), $dProgPct=$('#d-prog-pct'),
        $dProgFill=$('#d-prog-fill'), $dProgStatus=$('#d-prog-status'),
        $drawerClose=$('#drawer-close');
  function $(id) { return document.getElementById(id.replace(/^#/, '')); }

  function filtered() {
    return ALL_APPS.filter(a => {
      if (activeTag  !== 'all' && !(a.tags||[]).includes(activeTag)) return false;
      if (activeOS   !== 'all' && a.os   !== activeOS)   return false;
      if (activeArch !== 'all' && a.arch !== activeArch) return false;
      if (keyword && !a.name.toLowerCase().includes(keyword) && !(a.description||'').toLowerCase().includes(keyword)) return false;
      return true;
    });
  }

  function iconEl(app, lg) {
    const wrap = document.createElement('div'); wrap.className = lg ? 'drawer-icon' : 'card-icon';
    if (app.icon) {
      const img = document.createElement('img'); img.src = app.icon; img.alt = app.name;
      img.onerror = () => { wrap.innerHTML = ''; wrap.appendChild(fallbackEl(app)); };
      wrap.appendChild(img);
    } else { wrap.appendChild(fallbackEl(app)); }
    return wrap;
  }
  function fallbackEl(app) {
    const fb = document.createElement('div'); fb.className = 'fallback';
    fb.textContent = (app.name||'?')[0].toUpperCase();
    const s = (app.tags||[])[0] ? tagStyle(app.tags[0]) : {bg:'var(--accent-bg)',color:'var(--accent-text)'};
    fb.style.background = s.bg; fb.style.color = s.color;
    return fb;
  }

  function makeBadge(text, style, clickable) {
    const b = document.createElement('span'); b.className = 'tag';
    b.textContent = text; b.style.background = style.bg; b.style.color = style.color;
    if (clickable) { b.title = `筛选：${text}`; b.addEventListener('click', e => { e.stopPropagation(); activeTag = text; renderSidebar(); renderGrid(); }); }
    return b;
  }

  function renderSidebar() {
    const tagC={}, osC={}, archC={};
    ALL_APPS.forEach(a => {
      (a.tags||[]).forEach(t => { tagC[t]=(tagC[t]||0)+1; });
      if (a.os)   osC[a.os]   =(osC[a.os]  ||0)+1;
      if (a.arch) archC[a.arch]=(archC[a.arch]||0)+1;
    });
    function sec(label, items, active) {
      if (!Object.keys(items).length) return '';
      let h = `<div class="sidebar-section"><div class="sidebar-label">${label}</div>`;
      h += `<button class="filter-btn${active==='all'?' active':''}" data-sec="${label}" data-val="all"><span style="flex:1">全部</span><span class="filter-count">${ALL_APPS.length}</span></button>`;
      Object.entries(items).forEach(([k,n]) => {
        const isActive = active===k;
        let dot = '';
        if (label==='标签') { const s=tagStyle(k); dot=`<span class="tag-dot" style="background:${s.bg};outline:1px solid ${s.color}55"></span>`; }
        h += `<button class="filter-btn${isActive?' active':''}" data-sec="${label}" data-val="${esc(k)}">${dot}<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(k)}</span><span class="filter-count">${n}</span></button>`;
      });
      return h + '</div>';
    }
    $sidebar.innerHTML = sec('标签',tagC,activeTag) + sec('系统',osC,activeOS) + sec('架构',archC,activeArch);
    $sidebar.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => {
      const s=btn.dataset.sec, v=btn.dataset.val;
      if (s==='标签') activeTag=v; else if (s==='系统') activeOS=v; else activeArch=v;
      renderSidebar(); renderGrid();
    }));
  }

  function renderGrid() {
    const list = filtered();
    $count.textContent = `${list.length} 款软件`;
    if (!list.length) { $main.innerHTML = `<div class="empty"><svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="18" cy="18" r="12"/><line x1="27" y1="27" x2="37" y2="37"/></svg><p>没有找到匹配的软件</p></div>`; return; }
    const grid = document.createElement('div'); grid.className = 'grid';
    list.forEach(app => {
      const card = document.createElement('div');
      card.className = 'card'; card.tabIndex = 0; card.setAttribute('role','button'); card.setAttribute('aria-label',app.name);
      card.appendChild(iconEl(app, false));
      const body = document.createElement('div');
      body.innerHTML = `<div class="card-name">${esc(app.name)}</div><div class="card-desc">${esc(app.description||'')}</div>`;
      const tr = document.createElement('div'); tr.className = 'tags-row';
      (app.tags||[]).forEach(t => tr.appendChild(makeBadge(t, tagStyle(t), true)));
      if (app.os)   tr.appendChild(makeBadge(app.os,   osStyle(app.os),   false));
      if (app.arch) tr.appendChild(makeBadge(app.arch, archStyle(app.arch), false));
      body.appendChild(tr);
      body.innerHTML += `<div class="card-footer"><span class="version-badge">v${esc(app.version||'-')}</span><a class="dl-btn" href="${esc(app.download_url)}" download onclick="event.stopPropagation()"><svg width="12" height="12" viewBox="0 0 12 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M6 1v7M3.5 5.5L6 8l2.5-2.5M1.5 10h9"/></svg>下载</a></div>`;
      card.appendChild(body);
      card.addEventListener('click', () => openDrawer(app));
      card.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') openDrawer(app); });
      grid.appendChild(card);
    });
    $main.innerHTML = ''; $main.appendChild(grid);
  }

  function openDrawer(app) {
    currentApp = app;
    $dIcon.innerHTML = ''; $dIcon.appendChild(iconEl(app, true));
    $dName.textContent = app.name; $dPublisher.textContent = app.publisher || '';
    $dTags.innerHTML = '';
    (app.tags||[]).forEach(t => $dTags.appendChild(makeBadge(t, tagStyle(t), true)));
    if (app.os)   $dTags.appendChild(makeBadge(app.os,   osStyle(app.os),   false));
    if (app.arch) $dTags.appendChild(makeBadge(app.arch, archStyle(app.arch), false));
    $dDesc.textContent = app.description || '';
    $dMeta.innerHTML = `
      <div class="meta-card"><div class="meta-label">版本</div><div class="meta-val">${esc(app.version||'-')}</div></div>
      <div class="meta-card"><div class="meta-label">大小</div><div class="meta-val">${esc(app.size||'-')}</div></div>
      <div class="meta-card"><div class="meta-label">系统</div><div class="meta-val">${esc(app.os||'-')}</div></div>
      <div class="meta-card"><div class="meta-label">架构</div><div class="meta-val">${esc(app.arch||'-')}</div></div>`;
    resetProgress();
    $dDlBtn.innerHTML = `<svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7.5 1v9M4.5 7l3 3 3-3M2 12h11"/></svg> 下载`;
    $dDlBtn.disabled = false;
    $overlay.classList.add('open'); $drawer.classList.add('open');
    $drawerClose.focus(); document.body.style.overflow = 'hidden';
  }
  function closeDrawer() { $overlay.classList.remove('open'); $drawer.classList.remove('open'); document.body.style.overflow = ''; currentApp = null; }
  function resetProgress() {
    $dProgress.classList.remove('visible'); $dProgFill.style.width='0%'; $dProgFill.style.background='var(--accent)';
    $dProgLabel.textContent='准备下载…'; $dProgPct.textContent='0%'; $dProgStatus.textContent=''; downloading=false;
  }

  $dDlBtn.addEventListener('click', async () => {
    if (!currentApp||downloading) return;
    const url = currentApp.download_url; if (!url) return;
    downloading=true; $dDlBtn.disabled=true; $dProgress.classList.add('visible'); $dProgLabel.textContent='连接中…';
    try {
      const res = await fetch(url); if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const total=parseInt(res.headers.get('Content-Length')||'0'), reader=res.body.getReader(), chunks=[]; let loaded=0;
      while (true) { const {done,value}=await reader.read(); if (done) break; chunks.push(value); loaded+=value.length; const p=total?Math.round(loaded/total*100):0; $dProgFill.style.width=p+'%'; $dProgPct.textContent=p+'%'; $dProgLabel.textContent=`正在下载… ${fmt(loaded)}${total?' / '+fmt(total):''}`; }
      const blob=new Blob(chunks), a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=url.split('/').pop(); a.click(); URL.revokeObjectURL(a.href);
      $dProgFill.style.width='100%'; $dProgPct.textContent='100%'; $dProgLabel.textContent='下载完成'; $dProgStatus.textContent=`已保存：${a.download}`;
      $dDlBtn.innerHTML=`<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7l4 4 6-6"/></svg> 完成`;
    } catch(err) { $dProgLabel.textContent='下载失败'; $dProgStatus.textContent=err.message; $dProgFill.style.background='#e24b4a'; $dDlBtn.disabled=false; downloading=false; }
  });

  function fmt(b) { if (b<1024) return b+' B'; if (b<1048576) return (b/1024).toFixed(1)+' KB'; return (b/1048576).toFixed(1)+' MB'; }
  function esc(s) { return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  $overlay.addEventListener('click', closeDrawer);
  $drawerClose.addEventListener('click', closeDrawer);
  document.addEventListener('keydown', e => { if (e.key==='Escape') closeDrawer(); });
  $search.addEventListener('input', () => { keyword=$search.value.trim().toLowerCase(); renderGrid(); });

  (async () => {
    try { const r=await fetch('/api/apps'); ALL_APPS=await r.json(); } catch { ALL_APPS=[]; }
    $skeleton.remove(); renderSidebar(); renderGrid();
  })();
})();
</script>
</body>
</html>
